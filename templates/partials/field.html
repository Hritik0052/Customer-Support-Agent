{% comment %}Renders one bound form field with label, errors and help text.{% endcomment %}
<div>
  <label for="{{ field.id_for_label }}" class="label">
    {{ field.label }}
    {% if field.field.required %}<span class="text-rose-500" aria-hidden="true">*</span>{% endif %}
  </label>

  {{ field }}

  {% if field.help_text %}
    <p class="mt-1.5 text-xs text-slate-500 dark:text-slate-500">{{ field.help_text|safe }}</p>
  {% endif %}

  {% for error in field.errors %}
    <p class="form-error">{{ error }}</p>
  {% endfor %}
</div>
