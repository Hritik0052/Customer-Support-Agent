{% comment %}
Params: title, body, icon (tag|fire|heart|doc|chat|chart), color, delay
{% endcomment %}
<div class="reveal card-hover group p-6" {% if delay %}data-reveal-delay="{{ delay }}"{% endif %}>
  <div class="mb-5 inline-flex h-12 w-12 items-center justify-center rounded-xl transition-transform duration-300 group-hover:scale-110
    {% if color == 'brand' %}bg-brand-100 text-brand-600 dark:bg-brand-500/15 dark:text-brand-400
    {% elif color == 'orange' %}bg-orange-100 text-orange-600 dark:bg-orange-500/15 dark:text-orange-400
    {% elif color == 'rose' %}bg-rose-100 text-rose-600 dark:bg-rose-500/15 dark:text-rose-400
    {% elif color == 'emerald' %}bg-emerald-100 text-emerald-600 dark:bg-emerald-500/15 dark:text-emerald-400
    {% elif color == 'violet' %}bg-violet-100 text-violet-600 dark:bg-violet-500/15 dark:text-violet-400
    {% else %}bg-sky-100 text-sky-600 dark:bg-sky-500/15 dark:text-sky-400{% endif %}">
    <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
      {% if icon == 'tag' %}<path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5a2 2 0 011.4.6l7 7a2 2 0 010 2.8l-5.2 5.2a2 2 0 01-2.8 0l-7-7A2 2 0 013 10.2V5a2 2 0 012-2z"/>
      {% elif icon == 'fire' %}<path stroke-linecap="round" stroke-linejoin="round" d="M12 2s4 4 4 8a4 4 0 01-8 0c0-1.5.5-2.5 1-3.5C9.5 8 9 9 9 10a3 3 0 006 0c0-4-3-8-3-8z"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 22a7 7 0 007-7c0-3-2-6-3-7.5"/>
      {% elif icon == 'heart' %}<path stroke-linecap="round" stroke-linejoin="round" d="M20.8 6.6a5.5 5.5 0 00-7.8 0L12 7.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 23l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/>
      {% elif icon == 'doc' %}<path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.6a2 2 0 011.4.6l4.4 4.4a2 2 0 01.6 1.4V19a2 2 0 01-2 2z"/>
      {% elif icon == 'chat' %}<path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12a8 8 0 01-8 8 9 9 0 01-4-.9L3 21l1.9-5.7A8 8 0 013 12a8 8 0 018-8h1a8 8 0 018 8z"/>
      {% else %}<path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6M15 19V9M21 19V5M3 19h18M3 19V9"/>{% endif %}
    </svg>
  </div>

  <h3 class="text-lg font-semibold text-slate-900 dark:text-white">{{ title }}</h3>
  <p class="mt-2 text-sm leading-relaxed text-slate-600 dark:text-slate-400">{{ body }}</p>
</div>
