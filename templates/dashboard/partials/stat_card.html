{% comment %}Params: label, value, color, icon, delay{% endcomment %}
<div class="reveal card-hover group p-5" {% if delay %}data-reveal-delay="{{ delay }}"{% endif %}>
  <div class="flex items-start justify-between">
    <div class="min-w-0">
      <p class="truncate text-xs font-semibold tracking-wide text-slate-400 uppercase">{{ label }}</p>
      <p class="mt-2 text-3xl font-extrabold text-slate-900 tabular-nums dark:text-white">
        <span data-countup="{{ value }}">0</span>
      </p>
    </div>

    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl transition-transform duration-300 group-hover:scale-110
      {% if color == 'brand' %}bg-brand-100 text-brand-600 dark:bg-brand-500/15 dark:text-brand-400
      {% elif color == 'sky' %}bg-sky-100 text-sky-600 dark:bg-sky-500/15 dark:text-sky-400
      {% elif color == 'rose' %}bg-rose-100 text-rose-600 dark:bg-rose-500/15 dark:text-rose-400
      {% elif color == 'violet' %}bg-violet-100 text-violet-600 dark:bg-violet-500/15 dark:text-violet-400
      {% elif color == 'orange' %}bg-orange-100 text-orange-600 dark:bg-orange-500/15 dark:text-orange-400
      {% else %}bg-red-100 text-red-600 dark:bg-red-500/15 dark:text-red-400{% endif %}">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
        {% if icon == 'inbox' %}<path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0h-4l-1.5 3h-5L8 13H4m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5"/>
        {% elif icon == 'card' %}<rect x="2" y="5" width="20" height="14" rx="2"/><path stroke-linecap="round" d="M2 10h20"/>
        {% elif icon == 'bug' %}<path stroke-linecap="round" stroke-linejoin="round" d="M9 4l1.5 2.5h3L15 4M5 9h14M6 9v5a6 6 0 0012 0V9M3 13h3m12 0h3M4.5 18l2-1.5m13 1.5l-2-1.5"/>
        {% elif icon == 'bulb' %}<path stroke-linecap="round" stroke-linejoin="round" d="M9.7 17h4.6M10 21h4M12 3a6 6 0 00-3.7 10.7c.5.4.7 1 .7 1.6v.7h6v-.7c0-.6.2-1.2.7-1.6A6 6 0 0012 3z"/>
        {% elif icon == 'fire' %}<path stroke-linecap="round" stroke-linejoin="round" d="M12 2s4 4 4 8a4 4 0 01-8 0c0-1.5.5-2.5 1-3.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 22a7 7 0 007-7c0-3-2-6-3-7.5"/>
        {% else %}<circle cx="12" cy="12" r="9"/><path stroke-linecap="round" d="M9 15c.8-1 1.8-1.5 3-1.5s2.2.5 3 1.5M9 9h.01M15 9h.01"/>{% endif %}
      </svg>
    </div>
  </div>
</div>
