{% extends "accounts/auth_base.html" %}

{% block title %}Password updated — SupportIQ{% endblock %}

{% block auth_content %}
  <div class="text-center">
    <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-emerald-100 text-emerald-600 dark:bg-emerald-500/15 dark:text-emerald-400">
      <svg class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Password updated</h1>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-400">You can now sign in with your new password.</p>
    <a href="{% url 'accounts:login' %}" class="btn-primary mt-6 w-full">Sign in</a>
  </div>
{% endblock %}
